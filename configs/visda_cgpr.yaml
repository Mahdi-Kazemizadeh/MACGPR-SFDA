seed: 42

dataset:
  name: "VisDA-C"
  root_env: "VISDA_ROOT"
  default_root: "./data/visda-c"
  target_split: "validation"
  num_classes: 12
  class_names:
    - aeroplane
    - bicycle
    - bus
    - car
    - horse
    - knife
    - motorcycle
    - person
    - plant
    - skateboard
    - train
    - truck

model:
  backbone: "resnet101"
  pretrained: false
  num_classes: 12
  checkpoint_path: "checkpoints/source_model.pth"

adaptation:
  method: "CGPR"
  iterations: 1
  train_epochs_per_iteration: 1
  k_clusters: 12
  initial_threshold: 0.95
  min_confident_samples: 200
  entropy_weight: 0.1
  diversity_weight: 0.1
  lr_backbone: 0.00001
  revert_threshold: 0.04

  reliability:
    reliability_threshold: 0.95
    confidence_weight: 0.40
    entropy_weight: 0.20
    cluster_weight: 0.25
    prototype_weight: 0.15

  query_selection:
    easy_threshold: 0.95
    hard_lower_threshold: 0.80
    hard_upper_threshold: 0.95
    max_hard_ratio: 0.10

risk_selection:
  high_confidence: 0.95
  low_confidence: 0.45
  low_entropy: 0.25
  high_entropy: 0.75
  safe_reliability: 0.95
  query_reliability: 0.80
  min_class_ratio: 0.005
  dominant_class_ratio: 0.18
  prototype_min_count: 20
  prototype_reliability_threshold: 0.90

loader:
  batch_size: 64
  num_workers: 0
  pin_memory: false

output:
  results_dir: "outputs/cgpr"