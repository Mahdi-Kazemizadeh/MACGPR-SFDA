seed: 42

dataset:
  name: "VisDA-C"
  root_env: "VISDA_ROOT"
  default_root: "./data/visda-c"
  target_split: "validation"
  num_classes: 12
  class_names:
    - aeroplane
    - bicycle
    - bus
    - car
    - horse
    - knife
    - motorcycle
    - person
    - plant
    - skateboard
    - train
    - truck

model:
  backbone: "resnet101"
  pretrained: false
  num_classes: 12
  checkpoint_path: "checkpoints/source_model.pth"

adaptation:
  method: "MACGPR"
  iterations: 6
  train_epochs_per_iteration: 1
  k_clusters: 12
  initial_threshold: 0.95
  min_confident_samples: 200
  entropy_weight: 0.1
  diversity_weight: 0.1
  lr_backbone: 0.0001
  revert_threshold: 0.04

reliability:
  high_threshold: 0.80
  low_threshold: 0.55
  alpha_confidence: 0.35
  beta_cluster: 0.25
  gamma_prototype: 0.25
  delta_mllm: 0.15

mllm:
  enabled: false
  selective_query: true
  cache_path: "cache_mllm/visda_mllm_labels.json"
  confidence_threshold: 0.80
  prototype_threshold: 0.40
  entropy_threshold: 1.00

loader:
  batch_size: 64
  num_workers: 0
  pin_memory: false

output:
  results_dir: "outputs/macgpr"